<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿猫阿狗游乐园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        /* 全局动画 */
        @keyframes float {
            0% {transform: translateY(0px);}
            50% {transform: translateY(-12px);}
            100% {transform: translateY(0px);}
        }
        @keyframes twinkle {
            0%,100% {opacity: 1;}
            50% {opacity: 0.6;}
        }
        @keyframes cloudMove {
            0% {background-position: 0 0;}
            100% {background-position: 1200px 0;}
        }
        body {
            background: linear-gradient(#87CEEB 0%, #FFE6EF 100%);
            background-image: url("https://img1.baidu.com/it/u=1296222291,3081241232&fm=253&fmt=auto&app=138&f=JPEG?w=1200&h=700");
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px 10px;
            position: relative;
            overflow-x: hidden;
        }
        /* 漂浮装饰小动物 */
        .decor-cat {
            position: fixed;
            top: 15%;
            left: 2%;
            font-size: 45px;
            animation: float 4s ease-in-out infinite;
            z-index: 1;
        }
        .decor-dog {
            position: fixed;
            top: 40%;
            right: 2%;
            font-size: 45px;
            animation: float 5s ease-in-out infinite;
            animation-delay: 1s;
            z-index: 1;
        }
        .decor-wheel {
            position: fixed;
            bottom: 10%;
            left: 5%;
            font-size: 50px;
            animation: float 6s ease-in-out infinite;
            animation-delay: 0.5s;
            z-index: 1;
        }
        /* 头部标题 */
        .header {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            padding: 24px;
            margin: 0 auto 35px;
            max-width: 1000px;
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.25);
        }
        .header h1 {
            color: #ff4b85;
            font-size: 2.6rem;
            letter-spacing: 4px;
            animation: twinkle 3s infinite;
        }
        .header p {
            color: #777;
            margin-top: 10px;
            font-size: 1.15rem;
        }
        .count-info {
            margin-top: 12px;
            font-size: 1rem;
            color: #ff6b9d;
            font-weight: bold;
        }
        /* 上传面板 */
        .upload-box {
            position: relative;
            z-index: 2;
            background: rgba(255,255,255,0.94);
            max-width: 900px;
            margin: 0 auto 45px;
            padding: 30px;
            border-radius: 26px;
            box-shadow: 0 6px 22px rgba(255,136,170,0.18);
            transition: all 0.3s ease;
        }
        .upload-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 28px rgba(255,136,170,0.25);
        }
        .upload-box h2 {
            color: #ff77a8;
            margin-bottom: 18px;
            font-size: 1.5rem;
        }
        .input-line {
            margin: 16px 0;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #ffc8dd;
            border-radius: 14px;
            font-size: 1.05rem;
            outline: none;
            transition: 0.25s;
        }
        input[type="text"]:focus {
            border-color: #ff6b9d;
            box-shadow: 0 0 0 3px rgba(255,107,157,0.2);
        }
        input[type="file"] {
            width: 100%;
            padding: 12px;
            background: #fff0f6;
            border-radius: 14px;
            cursor: pointer;
        }
        #addBtn {
            width: 100%;
            padding: 15px;
            margin-top: 12px;
            background: linear-gradient(135deg,#ff6b9d,#ff85c0);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #addBtn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255,107,157,0.4);
        }
        #addBtn:active {
            transform: scale(0.98);
        }
        #addBtn.loading {
            background: #cccccc;
            pointer-events: none;
        }
        /* 相册区域 */
        .album-wrap {
            position: relative;
            z-index: 2;
            max-width: 1250px;
            margin: 0 auto;
        }
        .album-wrap h2 {
            text-align: center;
            color: #fff;
            text-shadow: 2px 2px 8px #ff4477;
            font-size: 2rem;
            margin-bottom: 30px;
        }
        .empty-tip {
            text-align: center;
            color: white;
            font-size: 1.4rem;
            padding: 80px 20px;
            text-shadow: 0 0 8px #ff5588;
        }
        .album-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 28px;
        }
        .media-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 18px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }
        .media-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 12px 30px rgba(255,107,157,0.28);
        }
        .media-view {
            width: 100%;
            height: 260px;
            object-fit: contain;
            display: block;
            background: #fcf5f8;
            cursor: zoom-in;
        }
        .card-text {
            padding: 16px;
        }
        .card-text h3 {
            color: #333;
            font-size: 1.1rem;
            margin-bottom: 12px;
            word-break: break-all;
        }
        .del-btn {
            padding: 9px 18px;
            background: #ff5767;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .del-btn:hover {
            background: #e63946;
        }
        /* 大图预览弹窗 */
        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }
        .preview-modal.show {
            display: flex;
        }
        .preview-content {
            max-width: 90%;
            max-height: 90vh;
        }
        .close-modal {
            position: absolute;
            top: 25px;
            right: 35px;
            font-size: 40px;
            color: #fff;
            cursor: pointer;
        }
        footer {
            text-align: center;
            margin-top: 60px;
            color: white;
            text-shadow: 0 0 6px #ff6699;
            padding: 20px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <!-- 漂浮装饰 -->
    <div class="decor-cat">🐱</div>
    <div class="decor-dog">🐶</div>
    <div class="decor-wheel">🎡</div>

    <div class="header">
        <h1>🎡 阿猫阿狗游乐园 🐱🐶</h1>
        <p>专属小动物乐园相册 · 珍藏每一份快乐瞬间</p>
        <div class="count-info" id="countText">相册总数：0 份素材</div>
    </div>

    <div class="upload-box">
        <h2>✨ 上传照片/视频存入游乐园相册</h2>
        <div class="input-line">
            <input type="text" id="mediaTitle" placeholder="给素材起个可爱名字，例：摩天轮下玩耍的小猫">
        </div>
        <div class="input-line">
            <input type="file" id="fileInput" accept="image/*,video/*" multiple>
        </div>
        <button id="addBtn">保存到游乐园相册</button>
    </div>

    <div class="album-wrap">
        <h2>我的游乐园相册</h2>
        <div class="album-list" id="albumContainer"></div>
    </div>

    <!-- 大图预览弹窗 -->
    <div class="preview-modal" id="previewModal">
        <span class="close-modal" id="closeModal">×</span>
        <img class="preview-content" id="previewImg" src="">
        <video class="preview-content" id="previewVideo" controls style="display:none;"></video>
    </div>

    <footer>
        © 2026 阿猫阿狗游乐园 | 所有素材仅本地浏览器存储，不会上传网络
    </footer>

    <script>
        const titleInput = document.getElementById('mediaTitle');
        const fileInput = document.getElementById('fileInput');
        const addBtn = document.getElementById('addBtn');
        const albumContainer = document.getElementById('albumContainer');
        const countText = document.getElementById('countText');
        const previewModal = document.getElementById('previewModal');
        const previewImg = document.getElementById('previewImg');
        const previewVideo = document.getElementById('previewVideo');
        const closeModal = document.getElementById('closeModal');

        // 读取本地存储素材
        let mediaList = JSON.parse(localStorage.getItem('catDogParkAlbum')) || [];

        // 更新素材数量统计
        function updateCount() {
            countText.innerText = `相册总数：${mediaList.length} 份素材`;
        }

        // 渲染相册页面
        function renderAlbum() {
            albumContainer.innerHTML = '';
            updateCount();
            if (mediaList.length === 0) {
                albumContainer.innerHTML = `<div class="empty-tip">🎠 相册空空，快上传照片和视频记录游乐园时光吧！</div>`;
                return;
            }
            mediaList.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'media-card';
                let mediaDom = '';
                if(item.type.includes('image')){
                    mediaDom = `<img class="media-view" data-src="${item.src}" data-type="image" alt="${item.name}" loading="lazy">`;
                }else if(item.type.includes('video')){
                    mediaDom = `<video class="media-view" data-src="${item.src}" data-type="video" preload="metadata" src="${item.src}"></video>`;
                }
                card.innerHTML = `
                    ${mediaDom}
                    <div class="card-text">
                        <h3>${item.name}</h3>
                        <button class="del-btn" data-index="${index}">删除本条记录</button>
                    </div>
                `;
                albumContainer.appendChild(card);
            })

            // 删除按钮事件
            document.querySelectorAll('.del-btn').forEach(btn => {
                btn.onclick = function() {
                    const idx = Number(this.dataset.index);
                    mediaList.splice(idx, 1);
                    localStorage.setItem('catDogParkAlbum', JSON.stringify(mediaList));
                    renderAlbum();
                }
            })

            // 点击图片弹窗放大预览
            document.querySelectorAll('.media-view').forEach(el => {
                el.onclick = function() {
                    const src = this.dataset.src;
                    const type = this.dataset.type;
                    previewImg.style.display = 'none';
                    previewVideo.style.display = 'none';
                    if(type === 'image'){
                        previewImg.src = src;
                        previewImg.style.display = 'block';
                    }else{
                        previewVideo.src = src;
                        previewVideo.style.display = 'block';
                    }
                    previewModal.classList.add('show');
                }
            })
        }

        // 关闭预览弹窗
        closeModal.onclick = () => previewModal.classList.remove('show');
        previewModal.onclick = (e) => {
            if(e.target === previewModal) previewModal.classList.remove('show');
        }

        // 页面初始化渲染相册
        renderAlbum();

        // 上传按钮核心逻辑（修复上传无响应，同步读取，无异步阻塞）
        addBtn.onclick = function () {
            const title = titleInput.value.trim();
            const files = fileInput.files;
            // 校验输入
            if (!title) {
                alert('请先给素材填写名称哦！');
                return;
            }
            if (files.length === 0) {
                alert('请选择照片或视频文件！');
                return;
            }
            // 超大文件拦截
            for(let i=0; i<files.length; i++){
                if(files[i].size > 100 * 1024 * 1024){
                    alert(`文件【${files[i].name}】超过100MB，无法上传！`);
                    return;
                }
            }
            // 按钮置灰加载状态
            this.classList.add('loading');
            this.innerText = '正在处理素材...';

            // 同步遍历读取文件，不使用异步Promise，彻底解决上传失效
            let finishNum = 0;
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();
                reader.onload = function(e) {
                    mediaList.push({
                        name: title,
                        src: e.target.result,
                        type: file.type
                    });
                    finishNum++;
                    // 全部读取完成后刷新页面
                    if(finishNum === files.length){
                        localStorage.setItem('catDogParkAlbum', JSON.stringify(mediaList));
                        renderAlbum();
                        // 恢复按钮状态
                        addBtn.classList.remove('loading');
                        addBtn.innerText = '保存到游乐园相册';
                        titleInput.value = '';
                        fileInput.value = '';
                        alert('上传成功！素材已展示在下方相册~');
                    }
                }
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
